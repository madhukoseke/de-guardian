# Render Blueprint — three services in one file:
#   1) Web Service   — the pipeline control surface
#   2) Cron Job      — the scheduled "daily" run
#   3) Postgres DB   — run history / audit trail (incident memory reads from it)
#
# Deploy: push to GitHub, then Render dashboard → New + → Blueprint → connect repo.
# Set SUPERPLANE_WEBHOOK_URL on the web + cron services after creating the Canvas trigger.

databases:
  - name: pipeline-runs-db
    plan: free
    databaseName: pipeline_runs
    user: pipeline

services:
  - type: web
    name: bash-script-funeral
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-runs-db
          property: connectionString
      - key: SUPERPLANE_WEBHOOK_URL
        sync: false   # paste your Canvas webhook URL in the dashboard
      - key: SUPERPLANE_WEBHOOK_SECRET
        sync: false   # HMAC key from the Pipeline Failed node (Reset Signature Key)
      - key: SERVICE_BASE_URL
        sync: false   # e.g. https://bash-script-funeral.onrender.com
      - key: RENDER_SERVICE_NAME
        value: bash-script-funeral

  - type: cron
    name: daily-revenue-aggregation
    runtime: python
    plan: starter   # cron jobs don't support free; ~$1/mo minimum
    schedule: "0 6 * * *"   # 06:00 UTC daily; change to "*/10 * * * *" to demo
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m jobs.scheduled_run"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-runs-db
          property: connectionString
      - key: SUPERPLANE_WEBHOOK_URL
        sync: false
      - key: SUPERPLANE_WEBHOOK_SECRET
        sync: false
      - key: SERVICE_BASE_URL
        sync: false
      - key: PIPELINE_MODE
        value: healthy   # arm a failure here to demo an unattended 6am break
