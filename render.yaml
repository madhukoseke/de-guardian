# Render Blueprint — defines THREE Render Services in one file.
# The Render partner track needs at least two; this gives you:
#   1) a Web Service   (the pipeline control surface / demo API)
#   2) a Cron Job      (the scheduled "daily" pipeline run)
#   3) a Postgres DB   (the queryable run-history / audit trail)
#
# Deploy: push this repo to GitHub, then in the Render dashboard:
#   New + -> Blueprint -> connect the repo. Render reads render.yaml and
#   provisions everything. Set SUPERPLANE_WEBHOOK_URL on the web service +
#   cron job after you create the Canvas trigger.

databases:
  - name: pipeline-runs-db
    plan: free
    databaseName: pipeline_runs
    user: pipeline

services:
  - type: web
    name: bash-script-funeral
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-runs-db
          property: connectionString
      - key: SUPERPLANE_WEBHOOK_URL
        sync: false   # paste your Canvas webhook URL in the dashboard
      - key: SUPERPLANE_WEBHOOK_SECRET
        sync: false   # HMAC key from the Pipeline Failed node (Reset Signature Key)
      - key: SERVICE_BASE_URL
        sync: false   # e.g. https://bash-script-funeral.onrender.com
      - key: RENDER_SERVICE_NAME
        value: bash-script-funeral

  - type: cron
    name: daily-revenue-aggregation
    runtime: python
    plan: starter   # cron jobs don't support free; ~$1/mo minimum
    schedule: "0 6 * * *"   # 06:00 UTC daily; change to "*/10 * * * *" to demo
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m jobs.scheduled_run"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipeline-runs-db
          property: connectionString
      - key: SUPERPLANE_WEBHOOK_URL
        sync: false
      - key: SUPERPLANE_WEBHOOK_SECRET
        sync: false
      - key: SERVICE_BASE_URL
        sync: false
      - key: PIPELINE_MODE
        value: healthy   # arm a failure here to demo an unattended 6am break
