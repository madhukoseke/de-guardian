name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Validate canvas placeholders documented
        run: |
          test -f canvas.yaml
          test -f fixtures/schema_drift_incident.json
          test -f fixtures/schema_drift_incident_novel.json
          test -f fixtures/schema_drift_incident_cloud.json
